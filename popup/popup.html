<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>VJam FX</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>VJam FX</h1>
      <div class="header-right">
        <span id="layer-count" class="layer-count"></span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle">
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <div class="action-bar">
      <button id="btn-prev" class="action-btn" title="Previous">◀</button>
      <button id="btn-next" class="action-btn" title="Next">▶</button>
      <button id="btn-kill" class="action-btn kill" title="Kill All">Kill</button>
      <button id="btn-random-fx" class="action-btn" title="Randomize FX">🎲 FX</button>
      <button id="btn-auto-cycle" class="action-btn" title="Auto Cycle">Auto</button>
    </div>

    <input type="text" id="preset-search" class="preset-search" placeholder="Search presets...">
    <div class="preset-list" id="preset-list">
      <!-- Presets injected by popup.js -->
    </div>

    <div class="section-label">Filters</div>
    <div class="filter-grid" id="filter-grid">
      <button class="filter-btn" data-filter="invert">Invert</button>
      <button class="filter-btn" data-filter="hue-rotate">Hue Rot</button>
      <button class="filter-btn" data-filter="grayscale">Gray</button>
      <button class="filter-btn" data-filter="saturate">Saturate</button>
      <button class="filter-btn" data-filter="brightness">Bright</button>
      <button class="filter-btn" data-filter="contrast">Contrast</button>
      <button class="filter-btn" data-filter="sepia">Sepia</button>
      <button class="filter-btn" data-filter="blur">Blur</button>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Blend</label>
        <select id="blend-mode">
          <option value="screen">Screen</option>
          <option value="lighten">Lighten</option>
          <option value="difference">Difference</option>
          <option value="exclusion">Exclusion</option>
        </select>
      </div>
      <div class="control-row">
        <label>Mic</label>
        <button id="mic-toggle" class="mic-btn on">ON</button>
      </div>
    </div>

    <footer class="footer">
      <a id="vjam-link" href="https://vjam.vercel.app" target="_blank" rel="noopener">
        VJam Full — 190+ Presets →
      </a>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
